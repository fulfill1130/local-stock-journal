<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>作業紀錄</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=20260605-logs-1">
</head>
<body>
  {% set token = request.args.get('token') %}
  {% macro with_token(url) -%}
    {{ url ~ ('?token=' ~ token|urlencode if token else '') }}
  {%- endmacro %}

  <main class="shell">
    <header class="topbar database-topbar">
      <a class="icon-button top-link" href="{{ with_token('/son') }}">兒子</a>
      <h1>作業紀錄</h1>
      <a class="icon-button top-link" href="{{ with_token('/mom') }}">媽媽</a>
    </header>

    <nav class="database-tabs" aria-label="資料庫功能">
      <a class="database-tab" href="{{ with_token('/database') }}">股票主檔</a>
      <a class="database-tab" href="{{ with_token('/database/dividends') }}">股利資料</a>
      <a class="database-tab active" href="{{ with_token('/database/logs') }}">作業紀錄</a>
      <a class="database-tab" href="{{ with_token('/database/uploads') }}">上傳庫</a>
    </nav>

    <section id="data-status-bar" class="data-status-bar" aria-label="資料更新狀態"></section>

    <section class="hero database-hero">
      <div>
        <p class="muted">背景請求與手動更新</p>
        <div class="hero-value" id="log-count">N/A</div>
        <div class="hero-sub">
          <span>最近狀態 <strong id="latest-log-status">N/A</strong></span>
          <span>最近作業 <strong id="latest-log-job">N/A</strong></span>
        </div>
      </div>
      <div class="hero-side">
        <span class="status-dot"></span>
        <span id="logs-updated-at">讀取中</span>
      </div>
    </section>

    <section class="panel">
      <div class="section-title database-section-title">
        <div>
          <h2>最近作業</h2>
          <span class="muted">只顯示摘要；詳細訊息可展開查看。</span>
        </div>
      </div>
      <div class="database-controls">
        <select id="log-status-filter" aria-label="status filter">
          <option value="">全部狀態</option>
          <option value="success">success</option>
          <option value="failed">failed</option>
        </select>
      </div>
      <div id="operation-log-list" class="operation-log-list"></div>
      <div id="operation-log-pagination" class="database-pagination"></div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='logs.js') }}?v=20260605-logs-1"></script>
</body>
</html>
